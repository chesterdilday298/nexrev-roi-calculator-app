<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexRev Energy ROI Calculator | Freedom EMS + NexiAI</title>
    <meta name="description" content="Calculate your energy savings potential with NexRev Freedom EMS and NexiAI. See payback period, 5-year ROI, and carbon impact for your portfolio." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #0C111D; font-family: 'Inter', sans-serif; color: #F5F5F6; }
      ::-webkit-scrollbar { width: 6px; } 
      ::-webkit-scrollbar-track { background: #161B26; }
      ::-webkit-scrollbar-thumb { background: #2A3144; border-radius: 3px; }
      input[type=range] { -webkit-appearance: none; appearance: none; background: transparent; cursor: pointer; width: 100%; }
      input[type=range]::-webkit-slider-runnable-track { background: #2A3144; border-radius: 4px; height: 6px; }
      input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; background: #1578F7; border-radius: 50%; height: 18px; width: 18px; margin-top: -6px; }
      input[type=range]::-moz-range-track { background: #2A3144; border-radius: 4px; height: 6px; }
      input[type=range]::-moz-range-thumb { background: #1578F7; border-radius: 50%; height: 18px; width: 18px; border: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
